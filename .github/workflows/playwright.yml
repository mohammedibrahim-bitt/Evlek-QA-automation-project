name: Playwright QA

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test
        env:
          BASE_URL: ${{ secrets.EVLEK_BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.EVLEK_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.EVLEK_TEST_USER_PASSWORD }}
          LOGIN_URL: ${{ vars.EVLEK_LOGIN_URL }}
          TEST_SEARCH_TERM: ${{ vars.EVLEK_TEST_SEARCH_TERM }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
